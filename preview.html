<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCRAYPR | Enterprise Web Scraping Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface": "#0a0e14",
        "primary-container": "#00c1fd",
        "outline": "#72757d",
        "on-background": "#f1f3fc",
        "background": "#0a0e14",
        "surface-container-lowest": "#000000",
        "surface-container-low": "#0f141a",
        "surface-container": "#151a21",
        "surface-bright": "#262c36",
        "on-surface-variant": "#a8abb3",
        "on-primary": "#004259",
        "secondary": "#929bfa",
        "tertiary": "#a7e2ff",
        "error": "#ff716c",
        "error-dim": "#d7383b",
        "outline-variant": "#44484f",
        "on-surface": "#f1f3fc",
        "secondary-container": "#343d96",
        "primary-fixed": "#00c1fd",
        "surface-tint": "#61cdff",
        "surface-container-highest": "#20262f",
        "surface-container-high": "#1b2028",
        "primary": "#61cdff",
        "primary-dim": "#00b2eb",
        "tertiary-dim": "#70c9ef",
        "surface-variant": "#20262f"
      },
      fontFamily: {
        "headline": ["Manrope","sans-serif"],
        "body": ["Inter","sans-serif"],
        "label": ["Inter","sans-serif"]
      },
    },
  },
}
</script>
<style>
body { background:#0a0e14; color:#f1f3fc; font-family:'Inter',sans-serif; }
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.material-filled { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
.glass-card { background:rgba(32,38,47,0.7); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); box-shadow:0 4px 10px rgba(0,0,0,0.1),0 40px 60px rgba(0,0,0,0.3); }
.glass-panel { background:rgba(32,38,47,0.7); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); }
.gradient-button { background:linear-gradient(135deg,#61cdff 0%,#00c1fd 100%); }
.glow-input:focus { box-shadow:0 0 15px rgba(97,205,255,0.2); }
.neo-shadow { box-shadow:0 4px 10px rgba(0,0,0,0.3),0 40px 80px rgba(0,0,0,0.6); }
.text-glow-primary { text-shadow:0 0 10px rgba(97,205,255,0.5); }
.inner-glow { box-shadow:inset 0 0 12px rgba(97,205,255,0.1); }
.hide-scrollbar::-webkit-scrollbar { display:none; }
.hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.animate-slide-up { animation:slideUp 0.3s ease-out; }
.animate-fade-in { animation:fadeIn 0.3s ease-out; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
.animate-pulse-dot { animation:pulse-dot 2s ease-in-out infinite; }
</style>
</head>
<body class="min-h-screen selection:bg-primary/30">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============ NO DEMO DATA — Start empty, only real user-created scrapers ============
const DEMO_SCRAPERS = [];
const DEMO_RESULTS = [];

// Note: This preview.html is a standalone UI preview. For real scraping functionality,
// use the full React app with the backend server (npm start).

// ============ ICON COMPONENT ============
function Icon({ name, filled, className = '' }) {
  return <span className={`material-symbols-outlined ${filled ? 'material-filled' : ''} ${className}`}>{name}</span>;
}

// ============ MAIN APP ============
function App() {
  const [page, setPage] = useState('dashboard');
  const [scrapers, setScrapers] = useState(DEMO_SCRAPERS);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [selectedScraper, setSelectedScraper] = useState(null);

  const navItems = [
    { id: 'dashboard', icon: 'grid_view', label: 'Dash', dIcon: 'dashboard', dLabel: 'Dashboard' },
    { id: 'create', icon: 'add_circle', label: 'Create', dIcon: 'travel_explore', dLabel: 'Scrapers' },
    { id: 'data', icon: 'database', label: 'Data', dIcon: 'database', dLabel: 'Results' },
    { id: 'guide', icon: 'bolt', label: 'Tools', dIcon: 'menu_book', dLabel: 'Guide' },
  ];

  const extraNav = [
    { icon: 'router', label: 'Proxies' },
    { icon: 'calendar_today', label: 'Schedules' },
    { icon: 'vpn_key', label: 'API Keys' },
    { icon: 'terminal', label: 'Logs' },
  ];

  function addScraper(s) {
    const newS = { ...s, id: String(Date.now()), status: 'idle', stats: { totalRecords: 0, successRate: 100, lastRun: null, runsCount: 0 }, schedule: { enabled: false, frequency: 'hourly' } };
    setScrapers(prev => [newS, ...prev]);
    setPage('dashboard');
  }

  function runScraper(id) {
    // In preview mode, scraping is not available — use the full React app with backend
    alert('Live scraping requires the full app with backend server.\n\nRun: npm start\nThen open: http://localhost:5173');
  }

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard scrapers={scrapers} onRun={runScraper} onNavigate={setPage} onSelectScraper={setSelectedScraper} />;
      case 'create': return <CreateScraper onAdd={addScraper} />;
      case 'data': return <ResultsBrowser scrapers={scrapers} selectedId={selectedScraper} />;
      case 'settings': return <ScraperSettings scraper={scrapers.find(s=>s.id===selectedScraper)} onUpdate={(updated) => setScrapers(prev=>prev.map(s=>s.id===updated.id?updated:s))} onBack={()=>setPage('dashboard')} />;
      case 'guide': return <UserGuide onNavigate={setPage} />;
      default: return <Dashboard scrapers={scrapers} onRun={runScraper} onNavigate={setPage} onSelectScraper={setSelectedScraper} />;
    }
  };

  return (
    <div className="min-h-screen bg-surface text-on-surface">
      {/* DESKTOP SIDEBAR */}
      <aside className="hidden lg:flex fixed left-0 top-0 h-full flex-col p-4 z-40 bg-slate-950/80 backdrop-blur-2xl w-64 border-r border-slate-800/50 shadow-2xl shadow-black/50">
        <div className="flex items-center gap-3 mb-10 px-2 pt-4">
          <div className="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
            <Icon name="hub" filled className="text-on-primary text-xl" />
          </div>
          <div>
            <h1 className="text-xl font-bold text-sky-400 font-headline">SCRAYPR</h1>
            <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Enterprise Scraper</p>
          </div>
        </div>
        <nav className="space-y-2 py-6 flex-grow font-headline text-sm font-semibold">
          {navItems.map(item => (
            <button key={item.id} onClick={() => setPage(item.id)}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${page === item.id ? 'bg-sky-500/10 text-sky-400 shadow-[inset_0_0_10px_rgba(56,189,248,0.1)]' : 'text-slate-400 hover:text-slate-100 hover:bg-white/5 hover:translate-x-1'}`}>
              <Icon name={item.dIcon} /><span>{item.dLabel}</span>
            </button>
          ))}
          {extraNav.map(item => (
            <button key={item.label} className="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-100 hover:bg-white/5 rounded-xl hover:translate-x-1 transition-all duration-200">
              <Icon name={item.icon} /><span>{item.label}</span>
            </button>
          ))}
        </nav>
        <div className="mt-auto space-y-2 border-t border-slate-800/50 pt-6">
          <button onClick={() => setPage('create')} className="w-full flex items-center justify-center gap-2 py-3 mb-4 rounded-xl gradient-button text-on-primary font-bold shadow-lg shadow-primary/20 active:scale-95 transition-all">
            <Icon name="add" className="text-lg" /><span>New Scraper</span>
          </button>
          <button className="w-full flex items-center gap-3 px-4 py-2 text-slate-500 hover:text-slate-300 transition-all text-sm">
            <Icon name="description" className="text-lg" /><span>Documentation</span>
          </button>
        </div>
      </aside>

      {/* MOBILE TOP BAR */}
      <header className="lg:hidden fixed top-0 w-full flex justify-between items-center px-6 h-16 bg-slate-950/70 backdrop-blur-2xl z-50 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]">
        <div className="flex items-center gap-4">
          <button onClick={() => setSidebarOpen(!sidebarOpen)} className="text-white active:scale-95"><Icon name="menu" /></button>
          <h1 className="font-headline font-black tracking-tighter text-blue-400 text-xl">SCRAYPR</h1>
        </div>
        <div className="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center text-primary">
          <Icon name="person" />
        </div>
      </header>

      {/* DESKTOP TOP BAR */}
      <header className="hidden lg:flex sticky top-0 w-full items-center justify-between px-8 py-3 bg-slate-900/70 backdrop-blur-xl z-30 shadow-[0_4px_30px_rgba(0,0,0,0.1)] ml-64">
        <nav className="flex items-center gap-6 font-headline text-sm font-medium">
          <button onClick={() => setPage('dashboard')} className={page==='dashboard' ? 'text-sky-400 font-bold border-b-2 border-sky-400 pb-1' : 'text-slate-400 hover:text-slate-200 transition-all'}>Overview</button>
          <button onClick={() => setPage('data')} className={page==='data' ? 'text-sky-400 font-bold border-b-2 border-sky-400 pb-1' : 'text-slate-400 hover:text-slate-200 transition-all'}>Insights</button>
          <button className="text-slate-400 hover:text-slate-200 transition-all">Billing</button>
        </nav>
        <div className="flex items-center gap-4">
          <div className="relative"><input className="bg-surface-container-lowest text-on-surface border-none rounded-full py-1.5 pl-10 pr-4 text-sm w-64 focus:ring-2 focus:ring-primary transition-all outline-none" placeholder="Search clusters..." /><Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm" /></div>
          <div className="flex items-center gap-2">
            <button className="p-2 text-slate-400 hover:bg-white/5 rounded-full"><Icon name="notifications" /></button>
            <button className="p-2 text-slate-400 hover:bg-white/5 rounded-full"><Icon name="help" /></button>
            <button className="p-2 text-slate-400 hover:bg-white/5 rounded-full"><Icon name="settings" /></button>
            <div className="w-8 h-8 rounded-full bg-surface-container-highest ml-2 border border-outline-variant/20 flex items-center justify-center text-primary"><Icon name="person" className="text-sm" /></div>
          </div>
        </div>
      </header>

      {/* MAIN CONTENT */}
      <main className="pt-16 lg:pt-0 pb-28 lg:pb-8 lg:ml-64">
        {renderPage()}
      </main>

      {/* MOBILE BOTTOM NAV */}
      <nav className="lg:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-slate-900/60 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        {navItems.map(item => (
          <button key={item.id} onClick={() => setPage(item.id)}
            className={`flex flex-col items-center justify-center transition-all active:scale-90 duration-300 ${page === item.id ? 'bg-blue-500/20 text-blue-400 rounded-full px-5 py-2 shadow-[0_0_15px_rgba(33,150,243,0.3)]' : 'text-slate-500 opacity-60 hover:opacity-100'}`}>
            <Icon name={item.icon} filled={page===item.id} />
            <span className="font-label text-[10px] font-medium uppercase tracking-widest mt-1">{item.label}</span>
          </button>
        ))}
      </nav>

      {/* MOBILE SIDEBAR */}
      {sidebarOpen && (
        <div className="lg:hidden fixed inset-0 z-[60]" onClick={() => setSidebarOpen(false)}>
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm animate-fade-in" />
          <aside className="absolute left-0 top-0 h-full w-72 bg-slate-950/95 backdrop-blur-2xl p-6 shadow-2xl animate-slide-up" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-8">
              <h2 className="font-headline font-black text-blue-400 text-xl">SCRAYPR</h2>
              <button onClick={() => setSidebarOpen(false)} className="text-slate-400"><Icon name="close" /></button>
            </div>
            <nav className="space-y-2">
              {navItems.map(item => (
                <button key={item.id} onClick={() => { setPage(item.id); setSidebarOpen(false); }}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${page === item.id ? 'bg-sky-500/10 text-sky-400' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                  <Icon name={item.dIcon} /><span className="font-headline font-semibold">{item.dLabel}</span>
                </button>
              ))}
            </nav>
          </aside>
        </div>
      )}
    </div>
  );
}

// ============ DASHBOARD ============
function Dashboard({ scrapers, onRun, onNavigate, onSelectScraper }) {
  const [syncDialog, setSyncDialog] = useState(null);
  const totalRecords = scrapers.reduce((a, s) => a + s.stats.totalRecords, 0);
  const avgSuccess = scrapers.length > 0 ? (scrapers.reduce((a, s) => a + s.stats.successRate, 0) / scrapers.length).toFixed(1) : 100;
  const activeCount = scrapers.filter(s => s.status === 'running').length;

  function handleRun(scraper) {
    onRun(scraper.id);
    setTimeout(() => {
      setSyncDialog({ name: scraper.name, count: Math.floor(Math.random()*150)+50 });
    }, 3100);
  }

  return (
    <div className="px-6 py-8 lg:p-8 max-w-7xl mx-auto">
      {/* Desktop Header */}
      <div className="hidden lg:flex justify-between items-end mb-10">
        <div>
          <h2 className="text-4xl font-extrabold font-headline tracking-tight mb-2">Fleet Overview</h2>
          <p className="text-on-surface-variant max-w-lg">Monitoring {scrapers.length} active data pipelines. Real-time extraction throughput is currently optimal.</p>
        </div>
        <div className="flex bg-surface-container-low p-1 rounded-full border border-outline-variant/10">
          <button className="px-6 py-2 bg-primary text-on-primary font-bold rounded-full text-sm">Real-time</button>
          <button className="px-6 py-2 text-on-surface-variant font-medium text-sm hover:text-on-surface transition-colors">Historical</button>
        </div>
      </div>

      {/* Mobile Header */}
      <div className="lg:hidden mb-8">
        <span className="text-primary font-bold tracking-[0.2em] uppercase text-xs">Quantum Extraction</span>
        <h2 className="text-3xl font-headline font-extrabold tracking-tight mt-2 mb-3">Data Command</h2>
        <p className="text-on-surface-variant text-sm">Monitor your high-velocity data operations in real-time.</p>
        <button onClick={() => onNavigate('create')} className="mt-4 gradient-button text-on-primary px-6 py-3 rounded-full font-bold text-sm shadow-lg shadow-primary/20 active:scale-95 transition-all flex items-center gap-2">
          <Icon name="rocket_launch" className="text-lg" /> Start Scrape
        </button>
      </div>

      {/* Stats Grid */}
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 lg:gap-6 mb-8 lg:mb-10">
        {/* Total Records */}
        <div className="md:col-span-2 glass-card p-6 lg:p-8 rounded-xl border border-outline-variant/10 relative overflow-hidden group">
          <div className="absolute top-4 right-4 lg:top-6 lg:right-8"><Icon name="speed" className="text-primary/20 text-5xl lg:text-6xl group-hover:scale-110 transition-transform" /></div>
          <p className="text-on-surface-variant font-medium mb-1 uppercase tracking-widest text-xs">Total Records</p>
          <h3 className="text-4xl lg:text-5xl font-black font-headline text-glow-primary mb-3">{(totalRecords/1000).toFixed(0)}K</h3>
          <div className="h-12 lg:h-16 flex items-end gap-1">
            {[50,75,66,100,85,75,66,50,75,100,85,50].map((h,i) => (
              <div key={i} className="w-2 rounded-full transition-all" style={{height:`${h}%`, background:`rgba(97,205,255,${0.2+i*0.07})`}} />
            ))}
          </div>
        </div>
        {/* Success Rate */}
        <div className="glass-card p-6 lg:p-8 rounded-xl border border-outline-variant/10">
          <p className="text-on-surface-variant font-medium mb-1 uppercase tracking-widest text-xs">Success Rate</p>
          <h3 className="text-3xl lg:text-4xl font-bold font-headline mb-4 lg:mb-6">{avgSuccess}%</h3>
          <div className="w-full bg-surface-container-lowest h-3 rounded-full overflow-hidden">
            <div className="bg-primary h-full rounded-full shadow-[0_0_8px_#61cdff]" style={{width:`${avgSuccess}%`}} />
          </div>
          <p className="text-xs text-on-surface-variant mt-3 flex items-center gap-1"><Icon name="check_circle" className="text-sm text-primary" /> No blockages in 24h</p>
        </div>
        {/* Active Scrapers */}
        <div className="glass-card p-6 lg:p-8 rounded-xl border border-outline-variant/10">
          <p className="text-on-surface-variant font-medium mb-1 uppercase tracking-widest text-xs">Active Nodes</p>
          <h3 className="text-3xl lg:text-4xl font-bold font-headline mb-4 lg:mb-6">{scrapers.length} <span className="text-sm font-normal text-on-surface-variant">scrapers</span></h3>
          <div className="flex flex-wrap gap-1">
            {scrapers.map((s,i) => (
              <div key={i} className={`w-3 h-3 rounded-sm ${s.status === 'running' ? 'bg-primary/80 animate-pulse' : s.status === 'error' ? 'bg-error/80' : 'bg-primary/40'}`} />
            ))}
            {Array(9).fill(0).map((_,i) => <div key={`p${i}`} className="w-3 h-3 rounded-sm bg-primary/20" />)}
          </div>
          <p className="text-xs text-on-surface-variant mt-3">{activeCount} actively running</p>
        </div>
      </div>

      {/* Active Pipelines */}
      <div className="mb-4 lg:mb-6 flex items-center justify-between">
        <h4 className="text-xl lg:text-2xl font-bold font-headline">Active Pipelines</h4>
        <button className="text-primary font-bold text-sm hover:underline">View All Clusters</button>
      </div>
      <div className="space-y-3 lg:space-y-4">
        {scrapers.map(scraper => {
          const isRunning = scraper.status === 'running';
          return (
            <div key={scraper.id} className="glass-card rounded-xl border border-outline-variant/10 p-4 lg:p-6 hover:bg-white/5 transition-all group">
              <div className="flex items-center justify-between flex-wrap gap-4">
                <div className="flex items-center gap-4 lg:gap-6">
                  <div className="w-10 h-10 lg:w-12 lg:h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary border border-outline-variant/20">
                    <Icon name={scraper.fields[0]?.icon || 'language'} />
                  </div>
                  <div>
                    <h5 className="text-base lg:text-lg font-bold font-headline mb-0.5">{scraper.name}</h5>
                    <div className="flex items-center gap-3 text-xs lg:text-sm text-on-surface-variant">
                      <span className="flex items-center gap-1">
                        <span className={`w-2 h-2 rounded-full ${isRunning ? 'bg-primary animate-pulse-dot' : scraper.status === 'scheduled' ? 'bg-secondary' : 'bg-outline'}`} />
                        {isRunning ? 'Running' : scraper.status === 'scheduled' ? 'Scheduled' : 'Idle'}
                      </span>
                      <span>•</span>
                      <span>{scraper.stats.lastRun ? `Updated ${Math.floor(Math.random()*30)+1}m ago` : 'Never run'}</span>
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-6 lg:gap-12">
                  <div className="text-right hidden md:block">
                    <p className="text-xs uppercase tracking-widest text-on-surface-variant mb-1">Extraction Count</p>
                    <p className="text-lg lg:text-xl font-bold font-headline">{scraper.stats.totalRecords > 1000 ? `${(scraper.stats.totalRecords/1000000).toFixed(1)}M` : scraper.stats.totalRecords} <span className="text-xs text-primary">{scraper.stats.runsCount > 0 ? `+${Math.floor(Math.random()*15)}%` : ''}</span></p>
                  </div>
                  <div className="text-right hidden md:block">
                    <p className="text-xs uppercase tracking-widest text-on-surface-variant mb-1">Avg Latency</p>
                    <p className="text-lg lg:text-xl font-bold font-headline">{Math.floor(Math.random()*600)+200}ms</p>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => handleRun(scraper)} disabled={isRunning}
                      className={`px-3 py-2 rounded-lg text-sm font-bold transition-all ${isRunning ? 'bg-primary/10 text-primary/50 cursor-wait' : 'bg-primary/20 text-primary hover:bg-primary/30 active:scale-95'}`}>
                      {isRunning ? <span className="flex items-center gap-1"><Icon name="sync" className="text-sm animate-spin" /> Running</span> : 'Run'}
                    </button>
                    <button onClick={() => { onSelectScraper(scraper.id); onNavigate('settings'); }}
                      className="p-2 rounded-lg bg-surface-container-highest text-on-surface hover:bg-primary hover:text-on-primary transition-all">
                      <Icon name="chevron_right" />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Sync Dialog */}
      {syncDialog && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-fade-in" onClick={() => setSyncDialog(null)}>
          <div className="glass-card rounded-2xl p-8 max-w-sm w-full text-center neo-shadow animate-slide-up" onClick={e => e.stopPropagation()}>
            <div className="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center mx-auto mb-4">
              <Icon name="check_circle" filled className="text-primary text-4xl" />
            </div>
            <h3 className="font-headline font-bold text-2xl mb-2">Sync Complete</h3>
            <p className="text-primary font-bold mb-1">{syncDialog.count} new records processed</p>
            <p className="text-on-surface-variant text-sm mb-6">from {syncDialog.name}</p>
            <button onClick={() => { setSyncDialog(null); onNavigate('data'); }} className="w-full py-3 gradient-button text-on-primary rounded-xl font-bold mb-3 active:scale-95 transition-all">View Results</button>
            <button onClick={() => setSyncDialog(null)} className="w-full py-3 text-on-surface-variant hover:text-on-surface transition-colors font-medium">Dismiss</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ============ CREATE SCRAPER ============
function CreateScraper({ onAdd }) {
  const [name, setName] = useState('');

// ============ SCRAPER SETTINGS ============
function ScraperSettings({ scraper, onUpdate, onBack }) {
  const [name, setName] = useState(scraper?.name || '');
  const [url, setUrl] = useState(scraper?.url || '');
  const [autoScrape, setAutoScrape] = useState(scraper?.schedule?.enabled || false);
  const [freq, setFreq] = useState(scraper?.schedule?.frequency || 'hourly');
  const [saved, setSaved] = useState(false);
  const [activeTab, setActiveTab] = useState('config');

  useEffect(() => { if(scraper){ setName(scraper.name); setUrl(scraper.url); setAutoScrape(scraper.schedule?.enabled); setFreq(scraper.schedule?.frequency); }}, [scraper]);

  function handleSave() {
    if(scraper && onUpdate) onUpdate({...scraper, name, url, schedule:{enabled:autoScrape, frequency:freq}});
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  if(!scraper) return <div className="px-6 py-8 text-center text-on-surface-variant">Select a scraper from the dashboard.</div>;

  const logs = [
    { time: '12:04:32', level: 'success', msg: `Scrape completed: ${scraper.stats.totalRecords} records` },
    { time: '12:04:30', level: 'info', msg: 'Page fetched successfully (200)' },
    { time: '12:04:28', level: 'info', msg: `Scrape started for ${scraper.url}` },
    { time: '11:58:12', level: 'info', msg: 'Scraper configuration updated' },
    { time: '11:45:00', level: 'warning', msg: 'Rate limit approaching (80% threshold)' },
  ];

  return (
    <div className="px-6 py-8 lg:p-8 max-w-4xl mx-auto">
      <div className="flex items-center gap-2 text-sm text-on-surface-variant mb-2">
        <button onClick={onBack} className="hover:text-primary transition-colors flex items-center gap-1"><Icon name="arrow_back" className="text-lg" /> Scrapers</button>
        <span>›</span><span className="text-primary">{scraper.name}</span>
      </div>
      <h1 className="font-headline text-3xl font-extrabold mb-6 lg:mb-8">Scraper Settings & Logs</h1>

      <div className="flex gap-3 mb-6">
        <button className="px-5 py-2 rounded-full border border-outline-variant/30 text-on-surface font-bold text-sm hover:bg-surface-container-high transition-colors active:scale-95">Test Run</button>
        <button onClick={handleSave} className={`px-5 py-2 rounded-full font-bold text-sm transition-all active:scale-95 ${saved ? 'bg-primary/20 text-primary border border-primary/30' : 'gradient-button text-on-primary'}`}>
          {saved ? '✓ Saved' : 'Save Changes'}
        </button>
      </div>

      <div className="flex gap-3 mb-6">
        <button onClick={() => setActiveTab('config')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-colors ${activeTab==='config' ? 'bg-primary/10 text-primary' : 'text-on-surface-variant hover:text-on-surface'}`}>Configuration</button>
        <button onClick={() => setActiveTab('logs')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-colors ${activeTab==='logs' ? 'bg-primary/10 text-primary' : 'text-on-surface-variant hover:text-on-surface'}`}>Activity Logs</button>
      </div>

      {activeTab === 'config' ? (
        <div className="space-y-6">
          <div className="glass-card p-6 lg:p-8 rounded-xl border border-outline-variant/10">
            <div className="flex items-center gap-3 mb-6"><Icon name="settings" className="text-primary" /><h3 className="font-headline font-bold text-xl">General Configuration</h3></div>
            <div className="space-y-4">
              <div><label className="block text-sm font-medium text-on-surface-variant mb-2">Scraper Name</label>
              <input value={name} onChange={e => setName(e.target.value)} className="w-full bg-surface-container-lowest ring-1 ring-outline-variant/30 rounded-lg py-3 px-5 text-on-surface focus:ring-primary focus:ring-2 outline-none border-none glow-input" /></div>
              <div><label className="block text-sm font-medium text-on-surface-variant mb-2">Target Domain</label>
              <input value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-surface-container-lowest ring-1 ring-outline-variant/30 rounded-lg py-3 px-5 text-on-surface focus:ring-primary focus:ring-2 outline-none border-none glow-input" /></div>
            </div>
          </div>
          <div className="glass-card p-6 lg:p-8 rounded-xl border border-outline-variant/10">
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-3"><Icon name="autorenew" className="text-primary" /><h3 className="font-headline font-bold text-xl">Auto-Scraping</h3></div>
              <button onClick={() => setAutoScrape(!autoScrape)} className={`w-12 h-6 rounded-full relative p-1 transition-colors ${autoScrape ? 'bg-primary' : 'bg-outline-variant'}`}>
                <div className={`absolute top-1 w-4 h-4 rounded-full shadow-sm transition-all ${autoScrape ? 'right-1 bg-on-primary' : 'left-1 bg-surface'}`} />
              </button>
            </div>
            {autoScrape && (
              <div className="animate-slide-up">
                <label className="block text-sm font-medium text-on-surface-variant mb-3">Scheduling</label>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => setFreq('hourly')} className={`p-4 rounded-xl text-center font-bold transition-all ${freq==='hourly' ? 'bg-primary/20 text-primary border border-primary/30' : 'bg-surface-container-high border border-outline-variant/10 text-on-surface-variant hover:text-on-surface'}`}>
                    <Icon name="schedule" className="block mx-auto mb-1" />Hourly
                  </button>
                  <button onClick={() => setFreq('daily')} className={`p-4 rounded-xl text-center font-bold transition-all ${freq==='daily' ? 'bg-primary/20 text-primary border border-primary/30' : 'bg-surface-container-high border border-outline-variant/10 text-on-surface-variant hover:text-on-surface'}`}>
                    <Icon name="calendar_today" className="block mx-auto mb-1" />Daily
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      ) : (
        <div className="glass-card rounded-xl border border-outline-variant/10 overflow-hidden">
          <div className="p-4 lg:p-6 border-b border-outline-variant/10"><h3 className="font-headline font-bold text-lg">Activity Log</h3></div>
          <div className="divide-y divide-outline-variant/10">
            {logs.map((log, i) => (
              <div key={i} className="px-4 lg:px-6 py-3 lg:py-4 flex items-start gap-3 hover:bg-white/[0.02] transition-colors">
                <Icon name={log.level==='success' ? 'check_circle' : log.level==='warning' ? 'warning' : 'info'} className={`text-sm mt-0.5 ${log.level==='success' ? 'text-primary' : log.level==='warning' ? 'text-error' : 'text-on-surface-variant'}`} />
                <div className="flex-grow"><p className="text-sm">{log.msg}</p><p className="text-xs text-on-surface-variant mt-0.5">{log.time}</p></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ============ USER GUIDE ============
function UserGuide({ onNavigate }) {
  const guides = [
    { num: 1, icon: 'rocket_launch', title: 'Deploy Your Cluster', desc: 'Set up your first scraper in minutes. Define your target URL, choose a scraping mode, and let SCRAYPR\'s intelligent engine handle the rest.',
      steps: ['Enter a target URL and name your scraper', 'Select Fast-Sync or Stealth mode', 'Click Initialize to begin extraction'] },
    { num: 2, icon: 'schema', title: 'Map the Schema', desc: 'Use CSS selectors to pinpoint exactly what data you need. Our visual selector tool shows live preview of extracted data.',
      code: '.product-card .price { /* price elements */ }\n[data-testid="title"] { /* attribute selectors */ }' },
    { num: 3, icon: 'settings_input_component', title: 'Advanced Selectors', desc: 'Go beyond basic CSS with regex patterns, nth-child filters, and attribute matching for precision extraction.',
      tips: ['Use regex to extract numbers: \\d+\\.?\\d*', 'Chain selectors with > for direct children', 'Use :not() to exclude unwanted elements'] },
    { num: 4, icon: 'database', title: 'Browse Real-Time Data', desc: 'View extracted data in a marketplace-style browser. Filter, search, and export results instantly.',
      features: [{icon:'visibility',label:'Live Preview'},{icon:'download',label:'Export CSV'},{icon:'autorenew',label:'Auto-Refresh'}] },
  ];

  return (
    <div className="px-6 py-8 lg:p-8 max-w-4xl mx-auto">
      <section className="mb-12 lg:mb-16">
        <span className="text-primary font-bold tracking-[0.2em] uppercase text-xs">SCRAYPR Academy</span>
        <h1 className="text-4xl lg:text-6xl font-headline font-extrabold tracking-tight mt-3 mb-4 lg:mb-6 bg-gradient-to-r from-white to-on-surface-variant bg-clip-text text-transparent">Master the<br/>Extraction</h1>
        <p className="text-on-surface-variant text-sm lg:text-lg max-w-xl leading-relaxed">Everything you need to deploy, configure, and scale your web scraping operations.</p>
      </section>
      <div className="space-y-6 lg:space-y-8 mb-12 lg:mb-16">
        {guides.map(g => (
          <div key={g.num} className="glass-card rounded-xl p-6 lg:p-8 border border-outline-variant/10 relative overflow-hidden group hover:border-primary/20 transition-colors">
            <div className="absolute -right-10 -top-10 w-32 h-32 bg-primary/5 rounded-full blur-3xl group-hover:bg-primary/10 transition-all" />
            <div className="flex items-start gap-4 lg:gap-6 relative z-10">
              <div className="flex-shrink-0 w-10 h-10 lg:w-12 lg:h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary font-headline font-bold text-lg">{g.num}</div>
              <div className="flex-grow">
                <div className="flex items-center gap-3 mb-3 lg:mb-4"><Icon name={g.icon} className="text-primary text-xl lg:text-2xl" /><h3 className="font-headline font-bold text-xl lg:text-2xl">{g.title}</h3></div>
                <p className="text-on-surface-variant leading-relaxed mb-4 lg:mb-6 text-sm lg:text-base">{g.desc}</p>
                {g.steps && <div className="space-y-2">{g.steps.map((s,i) => <div key={i} className="flex items-start gap-3"><div className="w-6 h-6 rounded-full bg-surface-container-highest flex items-center justify-center text-xs font-bold text-primary flex-shrink-0">{i+1}</div><span className="text-on-surface text-sm">{s}</span></div>)}</div>}
                {g.code && <div className="bg-black/30 rounded-lg p-4 font-mono text-xs lg:text-sm text-primary/80 whitespace-pre-wrap border border-outline-variant/10">{g.code}</div>}
                {g.tips && <div className="space-y-2">{g.tips.map((t,i) => <div key={i} className="flex items-start gap-2"><Icon name="tips_and_updates" className="text-primary text-sm mt-0.5" /><span className="text-sm text-on-surface-variant font-mono">{t}</span></div>)}</div>}
                {g.features && <div className="grid grid-cols-3 gap-3">{g.features.map((f,i) => <div key={i} className="bg-surface-container-low/50 rounded-lg p-3 border border-outline-variant/5 text-center"><Icon name={f.icon} className="text-primary mb-1 block mx-auto" /><span className="text-xs font-bold">{f.label}</span></div>)}</div>}
              </div>
            </div>
          </div>
        ))}
      </div>
      <div className="text-center py-8 lg:py-12">
        <h3 className="font-headline font-bold text-xl lg:text-2xl mb-3">Ready to start extracting?</h3>
        <p className="text-on-surface-variant mb-6">Create your first scraper and see results in minutes.</p>
        <button onClick={() => onNavigate('create')} className="inline-flex items-center gap-3 gradient-button text-on-primary px-8 lg:px-10 py-3 lg:py-4 rounded-full font-headline font-bold shadow-[0_0_30px_rgba(97,205,255,0.3)] hover:shadow-[0_0_45px_rgba(97,205,255,0.5)] transition-all active:scale-95">
          <Icon name="add" /> Create Your First Scraper
        </button>

}

// ============ RENDER ============
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
